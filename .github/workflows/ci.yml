name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop, audit/*]
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  solidity:
    name: Solidity Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Restrict network egress
        uses: bullfrogsec/bullfrog@1831f79cce8ad602eef14d2163873f27081ebfb3 # v0.8.4
        if: ${{ !env.ACT }} # Skip when running locally with act
        with:
          egress-policy: block
          allowed-domains: |
            api.github.com
            release-assets.githubusercontent.com
            raw.githubusercontent.com
            binaries.soliditylang.org

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Foundry
        run: ./.github/scripts/install-foundry.sh v1.4.2

      - name: Show Forge version
        run: forge --version
        working-directory: contracts/evm

      - name: Detect EVM changes
        if: github.event_name == 'pull_request'
        id: evm_changes
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -q '^contracts/evm/'; then
            echo "evm_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "evm_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Forge fmt
        run: forge fmt --check
        working-directory: contracts/evm
        id: fmt

      - name: Run Forge build
        run: FOUNDRY_PROFILE=prod forge build --sizes ./src # size-check deployable contracts only
        working-directory: contracts/evm
        id: build

      - name: Run Forge onMMSettle deposit/cross position-library tests
        run: |
          forge test -vvv -j 1 \
            --match-path 'test/libraries/VTSPositionLib.onMMSettle.t.sol' \
            --match-test 'test_onMMSettle_(deposits|crossMarket|fromDeltas|finding9|revertsOnInvalidPosition).*'
        working-directory: contracts/evm
        id: test_position_lib_on_mm_settle_deposit_cross

      - name: Run Forge onMMSettle active/withdraw position-library tests
        run: |
          forge test -vvv -j 1 \
            --match-path 'test/libraries/VTSPositionLib.onMMSettle.t.sol' \
            --match-test 'test_onMMSettle_(active|mixedDepositAndWithdrawal|withdrawals).*'
        working-directory: contracts/evm
        id: test_position_lib_on_mm_settle_active_withdraw

      - name: Run Forge onMMSettle seizing position-library tests
        run: |
          forge test -vvv -j 1 \
            --match-path 'test/libraries/VTSPositionLib.onMMSettle.t.sol' \
            --match-test 'test_onMMSettle_seizing_.*'
        working-directory: contracts/evm
        id: test_position_lib_on_mm_settle_seizing

      - name: Run remaining position-library tests
        run: |
          forge test -vvv \
            --match-path 'test/libraries/VTSPositionLib*.t.sol' \
            --no-match-path 'test/libraries/VTSPositionLib.onMMSettle.t.sol'
        working-directory: contracts/evm
        id: test_position_lib

      - name: Run Forge heavy fee-library tests
        run: forge test -vvv --match-path 'test/libraries/VTSFeeLib*.t.sol'
        working-directory: contracts/evm
        id: test_fee_lib

      - name: Run Forge fuzz tests
        run: forge test -vvv --match-path 'test/fuzz/**'
        working-directory: contracts/evm
        id: test_fuzz

      - name: Run remaining Forge tests
        run: |
          find test -type f -name '*.t.sol' \
            ! -path 'test/fuzz/*' \
            ! -name 'VTSPositionLib*.t.sol' \
            ! -name 'VTSFeeLib*.t.sol' \
            -print0 \
            | sort -z \
            | while IFS= read -r -d '' path; do
              forge test -vvv --match-path "$path"
            done
        working-directory: contracts/evm
        id: test_remaining

      - name: Run Forge coverage
        if: github.event_name == 'pull_request' &&
          steps.evm_changes.outputs.evm_changed == 'true'
        id: coverage
        working-directory: contracts/evm
        run: |
          # Run forge coverage and capture output
          COVERAGE_OUTPUT=$(bash coverage.sh 2>&1) || true
          echo "$COVERAGE_OUTPUT"

          # Save full output to file for the PR comment
          echo "$COVERAGE_OUTPUT" > coverage_report.txt

          # Extract the summary line (last line with percentages)
          # Format: | Total | X.XX% | X.XX% | X.XX% | X.XX% |
          SUMMARY_LINE=$(echo "$COVERAGE_OUTPUT" | grep -E "^\| Total" | tail -1)
          echo "Summary line: $SUMMARY_LINE"

          # Extract percentages using awk (handles format like "80.62(2645/3281)%")
          LINE_COV=$(echo "$SUMMARY_LINE" | awk -F'|' '{print $3}' | grep -oE '[0-9]+\.[0-9]+' | head -1)
          STMT_COV=$(echo "$SUMMARY_LINE" | awk -F'|' '{print $4}' | grep -oE '[0-9]+\.[0-9]+' | head -1)
          BRANCH_COV=$(echo "$SUMMARY_LINE" | awk -F'|' '{print $5}' | grep -oE '[0-9]+\.[0-9]+' | head -1)
          FUNC_COV=$(echo "$SUMMARY_LINE" | awk -F'|' '{print $6}' | grep -oE '[0-9]+\.[0-9]+' | head -1)

          echo "Line Coverage: $LINE_COV%"
          echo "Statement Coverage: $STMT_COV%"
          echo "Branch Coverage: $BRANCH_COV%"
          echo "Function Coverage: $FUNC_COV%"

          # Set outputs
          echo "line_cov=$LINE_COV" >> $GITHUB_OUTPUT
          echo "stmt_cov=$STMT_COV" >> $GITHUB_OUTPUT
          echo "branch_cov=$BRANCH_COV" >> $GITHUB_OUTPUT
          echo "func_cov=$FUNC_COV" >> $GITHUB_OUTPUT

          # Branch coverage trails the repo baseline, so keep a separate gate until the suite is improved.
          LINE_THRESHOLD=90
          STMT_THRESHOLD=90
          BRANCH_THRESHOLD=85
          FUNC_THRESHOLD=90
          FAILED=false

          is_valid_metric() {
            [[ "$1" =~ ^[0-9]+(\.[0-9]+)?$ ]]
          }

          for metric in LINE_COV STMT_COV BRANCH_COV FUNC_COV; do
            value="${!metric:-}"
            if ! is_valid_metric "$value"; then
              echo "❌ Failed to parse ${metric} from forge coverage output: '${value}'"
              FAILED=true
            fi
          done

          if is_valid_metric "$LINE_COV" && [ "$(echo "$LINE_COV < $LINE_THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "❌ Line coverage ($LINE_COV%) is below ${LINE_THRESHOLD}%"
            FAILED=true
          fi

          if is_valid_metric "$STMT_COV" && [ "$(echo "$STMT_COV < $STMT_THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "❌ Statement coverage ($STMT_COV%) is below ${STMT_THRESHOLD}%"
            FAILED=true
          fi

          if is_valid_metric "$BRANCH_COV" && [ "$(echo "$BRANCH_COV < $BRANCH_THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "❌ Branch coverage ($BRANCH_COV%) is below ${BRANCH_THRESHOLD}%"
            FAILED=true
          fi

          if is_valid_metric "$FUNC_COV" && [ "$(echo "$FUNC_COV < $FUNC_THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "❌ Function coverage ($FUNC_COV%) is below ${FUNC_THRESHOLD}%"
            FAILED=true
          fi

          echo "coverage_failed=$FAILED" >> $GITHUB_OUTPUT
          echo "Note: Forge branch % vs mutation kill-rate — see contracts/evm/MUTATION_COVERAGE.md"

      - name: Generate coverage comment body
        if: github.event_name == 'pull_request' &&
          steps.evm_changes.outputs.evm_changed == 'true'
        id: comment_body
        working-directory: contracts/evm
        run: |
          LINE_COV="${{ steps.coverage.outputs.line_cov }}"
          STMT_COV="${{ steps.coverage.outputs.stmt_cov }}"
          BRANCH_COV="${{ steps.coverage.outputs.branch_cov }}"
          FUNC_COV="${{ steps.coverage.outputs.func_cov }}"
          LINE_THRESHOLD=90
          STMT_THRESHOLD=90
          BRANCH_THRESHOLD=85
          FUNC_THRESHOLD=90

          # Determine status emoji for each metric
          get_status() {
            if [ -z "$1" ]; then
              echo "⚠️"
            elif [ "$(echo "$1 >= $2" | bc -l)" -eq 1 ]; then
              echo "✅"
            else
              echo "❌"
            fi
          }

          LINE_STATUS=$(get_status "$LINE_COV" "$LINE_THRESHOLD")
          STMT_STATUS=$(get_status "$STMT_COV" "$STMT_THRESHOLD")
          BRANCH_STATUS=$(get_status "$BRANCH_COV" "$BRANCH_THRESHOLD")
          FUNC_STATUS=$(get_status "$FUNC_COV" "$FUNC_THRESHOLD")

          # Overall status
          if [ "${{ steps.coverage.outputs.coverage_failed }}" == "true" ]; then
            OVERALL_STATUS="❌ **Coverage below threshold**"
          else
            OVERALL_STATUS="✅ **All coverage metrics meet threshold**"
          fi

          # Create the comment body
          cat << EOF > comment.md
          ## 📊 Forge Coverage Report

          $OVERALL_STATUS

          | Metric | Coverage | Status |
          |--------|----------|--------|
          | Line Coverage | ${LINE_COV:-N/A}% | $LINE_STATUS |
          | Statement Coverage | ${STMT_COV:-N/A}% | $STMT_STATUS |
          | Branch Coverage | ${BRANCH_COV:-N/A}% | $BRANCH_STATUS |
          | Function Coverage | ${FUNC_COV:-N/A}% | $FUNC_STATUS |

          <details>
          <summary>📋 Full Coverage Report</summary>

          \`\`\`
          $(cat coverage_report.txt)
          \`\`\`

          </details>

          ---
          *Coverage thresholds: line ${LINE_THRESHOLD}%, statement ${STMT_THRESHOLD}%, branch ${BRANCH_THRESHOLD}%, function ${FUNC_THRESHOLD}%*
          EOF

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request' &&
          steps.evm_changes.outputs.evm_changed == 'true'
        uses: mshick/add-pr-comment@v2
        with:
          message-path: contracts/evm/comment.md
          message-id: forge-coverage-report

      - name: Fail if coverage is below threshold
        if: github.event_name == 'pull_request' &&
          steps.evm_changes.outputs.evm_changed == 'true' &&
          steps.coverage.outputs.coverage_failed == 'true'
        run: |
          echo "❌ Coverage is below the configured threshold!"
          echo "Please improve test coverage before merging."
          exit 1

  reactive:
    name: Reactive Contracts Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Restrict network egress
        uses: bullfrogsec/bullfrog@1831f79cce8ad602eef14d2163873f27081ebfb3 # v0.8.4
        if: ${{ !env.ACT }} # Skip when running locally with act
        with:
          egress-policy: block
          allowed-domains: |
            api.github.com
            release-assets.githubusercontent.com
            raw.githubusercontent.com
            binaries.soliditylang.org

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Foundry
        run: ./.github/scripts/install-foundry.sh v1.4.2

      - name: Show Forge version
        run: forge --version
        working-directory: contracts/reactive

      - name: Run Forge fmt
        run: forge fmt --check
        working-directory: contracts/reactive
        id: reactive_fmt

      - name: Run Forge build
        run: forge build --sizes --skip test --skip script
        working-directory: contracts/reactive
        id: reactive_build

      - name: Run Forge tests
        run: forge test -vvv --fuzz-runs 256 --fuzz-timeout 60
        working-directory: contracts/reactive
        id: reactive_test
