name: codex-pr-verify

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Submit verification job
        id: submit
        env:
          RUNNER_URL: ${{ secrets.CODEX_RUNNER_URL }}
          RUNNER_AUTH: ${{ secrets.CODEX_RUNNER_BASIC_AUTH }}
          RUNNER_SECRET: ${{ secrets.CODEX_RUNNER_WEBHOOK_SECRET }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          payload="$(jq -n \
            --arg repo "${{ github.repository }}" \
            --argjson pr "${{ github.event.pull_request.number }}" \
            --arg base "${{ github.event.pull_request.base.ref }}" \
            --arg head "${{ github.event.pull_request.head.ref }}" \
            --arg title "$PR_TITLE" \
            --arg body "$PR_BODY" \
            '{
              provider: "github",
              repo: $repo,
              pr_number: $pr,
              base_ref: $base,
              head_ref: $head,
              prompt_profile: "pr_plan_verify",
              pr_context: {
                title: $title,
                body: $body,
                source: "pull_request.body"
              },
              metadata: {
                trigger: "pull_request",
                context_source: "github.event.pull_request.body"
              }
            }')"
          ts="$(date +%s)"
          sig="$(printf '%s.%s' "$ts" "$payload" | openssl dgst -sha256 -hmac "$RUNNER_SECRET" -hex | awk '{print $2}')"
          response="$(curl --fail --silent --show-error \
            -u "$RUNNER_AUTH" \
            -H "Content-Type: application/json" \
            -H "X-Codex-Runner-Timestamp: $ts" \
            -H "X-Codex-Runner-Signature: sha256=$sig" \
            -d "$payload" \
            "$RUNNER_URL/jobs/pr-verify")"
          echo "job_id=$(printf '%s' "$response" | jq -r '.job_id')" >> "$GITHUB_OUTPUT"

      - name: Poll verification job
        env:
          RUNNER_URL: ${{ secrets.CODEX_RUNNER_URL }}
          RUNNER_AUTH: ${{ secrets.CODEX_RUNNER_BASIC_AUTH }}
          RUNNER_SECRET: ${{ secrets.CODEX_RUNNER_WEBHOOK_SECRET }}
        run: |
          for _ in $(seq 1 120); do
            ts="$(date +%s)"
            sig="$(printf '%s.' "$ts" | openssl dgst -sha256 -hmac "$RUNNER_SECRET" -hex | awk '{print $2}')"
            response="$(curl --fail --silent --show-error \
              -u "$RUNNER_AUTH" \
              -H "X-Codex-Runner-Timestamp: $ts" \
              -H "X-Codex-Runner-Signature: sha256=$sig" \
              "$RUNNER_URL/jobs/${{ steps.submit.outputs.job_id }}")"
            status="$(printf '%s' "$response" | jq -r '.status')"
            verdict="$(printf '%s' "$response" | jq -r '.verification.verdict // empty')"
            if [ "$status" = "succeeded" ] || [ "$status" = "failed" ] || [ "$status" = "timed_out" ] || [ "$status" = "cancelled" ]; then
              printf '%s\n' "$response" | jq .
              {
                echo "## Codex Runner"
                printf '%s\n' "$response" | jq -r '.summary // "No summary returned."'
              } >> "$GITHUB_STEP_SUMMARY"
              if [ "$status" != "succeeded" ]; then
                exit 1
              fi
              if [ "$verdict" = "fail" ] || [ "$verdict" = "needs-human" ]; then
                exit 1
              fi
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for codex runner" >> "$GITHUB_STEP_SUMMARY"
          exit 1
