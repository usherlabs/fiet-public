name: Fuzz Invariants

on:
  push:
    branches: [main, develop]
    paths:
      - "contracts/evm/**"
      - ".github/workflows/fuzz-invariants.yml"
  pull_request:
    branches: [main, develop, audit/*]
    paths:
      - "contracts/evm/**"
      - ".github/workflows/fuzz-invariants.yml"
  workflow_dispatch:

jobs:
  fuzz-invariants:
    name: Fuzz Invariant Suite
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    defaults:
      run:
        working-directory: contracts/evm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Foundry
        run: ./.github/scripts/install-foundry.sh v1.4.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install crytic-compile
        shell: bash
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install crytic-compile
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          crytic-compile --version

      - name: Install Medusa (native)
        shell: bash
        run: |
          set -euo pipefail
          MEDUSA_VERSION="v1.5.1"
          ARCHIVE="medusa-linux-x64.tar.gz"
          URL="https://github.com/crytic/medusa/releases/download/${MEDUSA_VERSION}/${ARCHIVE}"

          curl -fsSL "$URL" -o /tmp/medusa.tar.gz
          rm -rf /tmp/medusa-bin
          mkdir -p /tmp/medusa-bin
          tar -xzf /tmp/medusa.tar.gz -C /tmp/medusa-bin
          if [ -x /tmp/medusa-bin/medusa ]; then
            sudo install -m 0755 /tmp/medusa-bin/medusa /usr/local/bin/medusa
          elif [ -x /tmp/medusa-bin/bin/medusa ]; then
            sudo install -m 0755 /tmp/medusa-bin/bin/medusa /usr/local/bin/medusa
          else
            echo "medusa binary not found in release archive" >&2
            find /tmp/medusa-bin -maxdepth 2 -type f | sort >&2
            exit 1
          fi

          medusa --version

      - name: Select fuzz mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" && "$BASE_REF" == "main" && "$HEAD_REF" == "develop" ]]; then
            echo "FUZZ_COMMAND=just --justfile Justfile fuzz-deep && just --justfile Justfile invariant-evidence-foundry" >> "$GITHUB_ENV"
            echo "Selected deep suite for develop -> main PR"
          else
            echo "FUZZ_COMMAND=just --justfile Justfile fuzz-invariants" >> "$GITHUB_ENV"
            echo "Selected default suite"
          fi

      - name: Show tool versions
        run: |
          forge --version
          just --version
          crytic-compile --version
          medusa --version

      - name: Run full invariant suite
        env:
          FOUNDRY_PROFILE: medusa
          FOUNDRY_OUT_DIR: out-medusa
          MEDUSA_CORPUS_DIR: artifacts/medusa-ci
        run: |
          rm -rf "$MEDUSA_CORPUS_DIR"
          mkdir -p "$(dirname "$MEDUSA_CORPUS_DIR")"
          bash -lc "$FUZZ_COMMAND"

      - name: Upload Medusa artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: medusa-fuzz-artifacts
          path: contracts/evm/artifacts/medusa-ci
          if-no-files-found: warn
