name: publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  version:
    name: Bump version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: bump
        run: |
          current=$(cat VERSION | tr -d '[:space:]')
          IFS='.' read -r major minor patch <<< "$current"

          bump="${{ inputs.bump }}"

          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          version="${major}.${minor}.${patch}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "Bumped ${current} -> ${version}"

      - name: Update VERSION file
        run: echo "${{ steps.bump.outputs.version }}" > VERSION

      - name: Commit and tag version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.bump.outputs.tag }}"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }} --tags

  release:
    name: Build and upload artifacts tarball
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Foundry
        run: ./.github/scripts/install-foundry.sh v1.4.2

      - name: Show Forge version
        run: forge --version

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack (yarn)
        run: corepack enable

      - name: Build artifacts tarball
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: ./scripts/build-artifacts.sh

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/fiet-protocol-${{ needs.version.outputs.tag }}.tar.gz
            dist/fiet-protocol-${{ needs.version.outputs.tag }}.tar.gz.sha256
