name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  solidity:
    strategy:
      fail-fast: true

    name: Solidity Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version
        working-directory: solidity

      - name: Run Forge fmt
        run: forge fmt --check
        working-directory: solidity
        id: fmt

      - name: Run Forge build
        run: forge build --sizes
        working-directory: solidity
        id: build

      - name: Run Forge tests
        run: forge test -vvv
        working-directory: solidity
        id: test

  foundry:
    strategy:
      fail-fast: true

    name: Run Cargo Tests
    runs-on: ubuntu-latest

    steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Install Rust
          uses: dtolnay/rust-toolchain@stable

        - name: Run tests for one
          run: cargo test --lib
          working-directory: stylus/fiet_stake