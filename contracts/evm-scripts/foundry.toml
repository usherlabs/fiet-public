[profile.default]
# Scripts project - references main evm project for sources
src = "../evm/src"
script = "script"
out = "out"
libs = ["../evm/lib"]

ignored_error_codes = [
  2394,
  5574,
  3860,
] # Silence transient storage composability warning

solc_version = '0.8.26'
evm_version = "cancun"
gas_limit = "3000000000"
optimizer_runs = 20000
optimizer = true
via_ir = true
ffi = true

bytecode_hash = "none"

fs_permissions = [
  { access = "read-write", path = "../evm/deployments" },
  { access = "read-write", path = ".forge-snapshots/" },
  { access = "read", path = "out/" },
  { access = "read", path = "../evm/out/" },
]

remappings = [
  "@openzeppelin/=../evm/lib/openzeppelin-contracts/",
  "v4-periphery/=../evm/lib/v4-periphery/",
  "@uniswap/v4-core/=../evm/lib/v4-periphery/lib/v4-core/",
  "permit2/=../evm/lib/permit2/",
  "solady/=../evm/lib/solady/",
  "forge-std/=../evm/lib/forge-std/src/",
]

# Libraries from main project
libraries = [
  "../evm/src/libraries/VTSPositionLib.sol:VTSPositionLib:0x2C95130C4DE0504c82f4688C657c9A4CC01761EF",
  "../evm/src/libraries/VTSSwapLib.sol:VTSSwapLib:0x8AF1433f3d2b0547A63f7004B9dA9C5953fD522D",
  "../evm/src/libraries/VTSCommitLib.sol:VTSCommitLib:0x6EBB20A904a9CA505e7d4A253c7FbF72DF5a777b",
  "../evm/src/libraries/LCCFactoryLib.sol:LCCFactoryLinkedLib:0x3209860215dB283218CBc8f0D5acf57Ae8874C85",
]

[rpc_endpoints]
local = "${ANVIL_FORK_URL}"
sepolia = "${ARB_SEPOLIA_RPC_URL}"
arbitrum = "${ARB_MAINNET_RPC_URL}"
ethsepolia = "${ETH_SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
arbitrum = { key = "${ETHERSCAN_API_KEY}" }
