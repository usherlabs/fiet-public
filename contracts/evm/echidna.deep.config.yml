# Echidna configuration (deep campaigns).
#
# Use with:
#   just fuzz-deep
# or:
#   just echidna file=... contract=... config=echidna.deep.config.yml
#

format: "text"

testMode: "property"
prefix: "echidna_"

coverage: false

# Deeper state exploration than the default config.
testLimit: 50000
seqLen: 100

maxValue: 100000000000000000000 # 100 ETH

