[profile.default]
src = "src"
out = "out"
libs = ["lib"]
ignored_error_codes = [
  2394,
  5574,
  3860,
] # Silence transient storage composability warning and test code warnings

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
solc_version = '0.8.26'
evm_version = "cancun"   # hard fork that enabled EIP-1153
gas_limit = "3000000000"

bytecode_hash = "none"

fs_permissions = [
  { access = "read-write", path = "./deployments" },
  { access = "read-write", path = ".forge-snapshots/" },
  { access = "read", path = "out/" },
  # Allow debug-mode NDJSON logging from tests via `vm.writeLine`.
  { access = "read-write", path = "../../.cursor/" },
]

remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

via_ir = false
optimizer = false
optimizer_runs = 0
# Mutation / Debug builds often change inlining behaviour; if we keep hard-linked library addresses here,
# calls can surface to addresses that have no code in the test VM (e.g. "delegatecall to non-contract").
# For mutation runs, prefer Foundry's auto-deploy/auto-link behaviour.
libraries = []

[profile.debug]
optimizer_runs = 200
fuzz.runs = 100
optimizer = true
ffi = true

[profile.ci]
# Disable via_ir to reduce memory usage in CI environments
# This is sufficient for testing - production builds should use default profile
optimizer_runs = 200
fuzz.runs = 1000
optimizer = true
ffi = true

[profile.echidna]
# Dedicated profile for Echidna's Foundry backend:
# - compile only the echidna harnesses under `test/fuzz` (avoids OOM / exit-137)
# - output to a separate directory so crytic-compile can consume it deterministically
# - hard-link `LCCFactoryLinkedLib` so HEVM doesn't reject unlinked placeholders
optimizer = true
optimizer_runs = 200
ffi = true
test = "test/fuzz"
out = "out-echidna"
libraries = [
  "src/libraries/LCCFactoryLib.sol:LCCFactoryLinkedLib:0x5f98cadc4827507463dd1c10fb618299e8661736",
  "src/libraries/LiquidityHubLinkedLib.sol:LiquidityHubLinkedLib:0xb3a02cd6d8fb5b8fe16dd569edf8be35a87bd0fa",
  # Prevent HEVM crashes by eliminating unlinked placeholders in unrelated contracts (e.g. VTSOrchestrator).
  # Deterministic CREATE2 address deployed by the SIG-BACKING harness (avoids any RPC fetch attempts).
  "src/libraries/VTSCommitLib.sol:VTSCommitLib:0x7642a5fddf1c8c0424f0bbecbbc41f74dd583046",
  # Deterministic CREATE2 address deployed by `VTSPositionLibEchidnaHarness` (avoids Echidna RPC fetch attempts).
  "src/libraries/VTSPositionLib.sol:VTSPositionLib:0x786b7eef5ee0ab7d361364e0620f474dff2211ae",
  # Intentional placeholders for libs that are not CREATE2-validated by this script.
  "src/libraries/VTSLifecycleLinkedLib.sol:VTSLifecycleLinkedLib:0x1111111111111111111111111111111111111113",
  "src/libraries/VTSSwapLib.sol:VTSSwapLib:0x1111111111111111111111111111111111111112",
  "src/libraries/VTSFeeLib.sol:VTSFeeLinkedLib:0x1111111111111111111111111111111111111111",
]

[profile.prod]
# ! Production deployments will adopt the Profile in contracts/evm-scripts/foundry.toml
# ! This profile is only used for production builds in local development, and testing.
optimizer_runs = 10000
optimizer = true
via_ir = true
ffi = true

[rpc_endpoints]
local = "${ANVIL_FORK_URL}"
sepolia = "${ARB_SEPOLIA_RPC_URL}"
arbitrum = "${ARB_MAINNET_RPC_URL}"
ethsepolia = "${ETH_SEPOLIA_RPC_URL}"

# For some reason etherscan api is required for local anvil fork.
[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
arbitrum = { key = "${ETHERSCAN_API_KEY}" }
