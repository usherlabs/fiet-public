[profile.default]
src = "src"
out = "out"
libs = ["lib"]
ignored_error_codes = [
  2394,
  5574,
  3860,
] # Silence transient storage composability warning and test code warnings

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
solc_version = '0.8.26'
evm_version = "cancun"   # hard fork that enabled EIP-1153
gas_limit = "3000000000"

bytecode_hash = "none"

fs_permissions = [
  { access = "read-write", path = "./deployments" },
  { access = "read-write", path = ".forge-snapshots/" },
  { access = "read", path = "out/" },
  # Allow debug-mode NDJSON logging from tests via `vm.writeLine`.
  { access = "read-write", path = "../../.cursor/" },
]

remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

via_ir = false
optimizer = false
optimizer_runs = 0
# Mutation / Debug builds often change inlining behaviour; if we keep hard-linked library addresses here,
# calls can surface to addresses that have no code in the test VM (e.g. "delegatecall to non-contract").
# For mutation runs, prefer Foundry's auto-deploy/auto-link behaviour.
libraries = []

[profile.debug]
optimizer_runs = 200
fuzz.runs = 100
optimizer = true
ffi = true

[profile.ci]
# Disable via_ir to reduce memory usage in CI environments
# This is sufficient for testing - production builds should use default profile
optimizer_runs = 200
fuzz.runs = 1000
optimizer = true
ffi = true

[profile.medusa]
# Dedicated profile for Medusa's Foundry backend:
# - compile only the fuzz harnesses under `test/fuzz` (avoids OOM / exit-137)
# - output to a separate directory so crytic-compile can consume it deterministically
# - hard-link selected libraries so Medusa sees fully linked bytecode
optimizer = true
optimizer_runs = 200
ffi = true
test = "test/fuzz"
out = "out-medusa"
libraries = [
  "src/libraries/LCCFactoryLib.sol:LCCFactoryLinkedLib:0xe34adbbf5bcd18c90967a8a93346ad99dc432cf8",
  "src/libraries/LiquidityHubLinkedLib.sol:LiquidityHubLinkedLib:0x71c33cff5828fbe22594f075e009d311a1168515",
  # Prevent unlinked placeholders in unrelated contracts (e.g. VTSOrchestrator).
  # Deterministic CREATE2 address deployed by the SIG-BACKING harness.
  "src/libraries/VTSCommitLib.sol:VTSCommitLib:0xc0853909ce464a2c2dbc641800feb4604db779ff",
  "src/libraries/VTSFeeLib.sol:VTSFeeLinkedLib:0x8f17762519b9f3c09549f839e17731d9a6ccb815",
  # Deterministic CREATE2 address deployed by `VTSPositionLibFuzzHarness`.
  "src/libraries/VTSPositionLib.sol:VTSPositionLib:0xfd93e929b1f3c9a73f0f4cb88a6d4c753f13c7cc",
  "src/libraries/VTSLifecycleLinkedLib.sol:VTSLifecycleLinkedLib:0xde354b2be7403312a3abbd62ffdc0e94924fba38",
  "src/libraries/VTSPositionMMOpsLib.sol:VTSPositionMMOpsLib:0xc6ab7729328c0e7fa54ff21ffcdce04ada89668f",
  # Intentional placeholder for libs that fuzz harness constructors do not
  # predeploy at deterministic addresses.
  "src/libraries/VTSSwapLib.sol:VTSSwapLib:0x1111111111111111111111111111111111111112",
]

[profile.prod]
# ! Production deployments will adopt the Profile in contracts/evm-scripts/foundry.toml
# ! This profile is only used for production builds in local development, and testing.
optimizer_runs = 25000
optimizer = true
via_ir = true
ffi = true

[rpc_endpoints]
local = "${ANVIL_FORK_URL}"
sepolia = "${ARB_SEPOLIA_RPC_URL}"
arbitrum = "${ARB_MAINNET_RPC_URL}"
ethsepolia = "${ETH_SEPOLIA_RPC_URL}"

# For some reason etherscan api is required for local anvil fork.
[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
arbitrum = { key = "${ETHERSCAN_API_KEY}" }
