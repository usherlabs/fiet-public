<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Reactive FIET protocol single-Hub sequence</title>
  <desc id="desc">HubRSC owns recipient registration, funding-gated lifecycle subscriptions, settlement dispatch, and self-continuation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3437"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #202427; font-size: 16px; }
      .actor { fill: #eef3ff; stroke: #6682c0; stroke-width: 2; rx: 6; }
      .lifeline { stroke: #9aa6b2; stroke-width: 2; stroke-dasharray: 6 6; }
      .msg { stroke: #2f3437; stroke-width: 2; marker-end: url(#arrow); }
      .note { fill: #fff8d7; stroke: #c4a642; stroke-width: 1.5; rx: 6; }
      .small { font-size: 14px; }
      .label { font-weight: 700; }
    </style>
  </defs>

  <rect width="1180" height="760" fill="#ffffff"/>

  <rect class="actor" x="55" y="24" width="150" height="56"/>
  <text class="label" x="130" y="58" text-anchor="middle">Operator</text>

  <rect class="actor" x="300" y="24" width="180" height="56"/>
  <text class="label" x="390" y="58" text-anchor="middle">LiquidityHub</text>

  <rect class="actor" x="625" y="24" width="170" height="56"/>
  <text class="label" x="710" y="58" text-anchor="middle">HubRSC</text>

  <rect class="actor" x="955" y="24" width="190" height="56"/>
  <text class="label" x="1050" y="49" text-anchor="middle">BatchProcessSettlement</text>
  <text class="small" x="1050" y="67" text-anchor="middle">Receiver</text>

  <line class="lifeline" x1="130" y1="80" x2="130" y2="710"/>
  <line class="lifeline" x1="390" y1="80" x2="390" y2="710"/>
  <line class="lifeline" x1="710" y1="80" x2="710" y2="710"/>
  <line class="lifeline" x1="1050" y1="80" x2="1050" y2="710"/>

  <rect class="note" x="520" y="104" width="380" height="58"/>
  <text x="710" y="128" text-anchor="middle">Recipient service is inactive until explicit</text>
  <text x="710" y="148" text-anchor="middle">registration plus positive funding units.</text>

  <text x="420" y="202" text-anchor="middle">registerRecipient(recipient, units)</text>
  <line class="msg" x1="130" y1="218" x2="705" y2="218"/>

  <text x="880" y="252" text-anchor="middle">subscribe exact recipient lifecycle filters</text>
  <path class="msg" d="M 710 268 C 835 238 835 298 710 288" fill="none"/>

  <text x="535" y="332" text-anchor="middle">SettlementQueued(lcc, recipient, amount)</text>
  <line class="msg" x1="390" y1="348" x2="705" y2="348"/>

  <text x="880" y="382" text-anchor="middle">debit matching-event unit, enqueue pending key</text>
  <path class="msg" d="M 710 398 C 835 368 835 428 710 418" fill="none"/>

  <text x="535" y="462" text-anchor="middle">LiquidityAvailable(lcc, amount)</text>
  <line class="msg" x1="390" y1="478" x2="705" y2="478"/>

  <text x="880" y="512" text-anchor="middle">debit processing unit, reserve attempt</text>
  <path class="msg" d="M 710 528 C 835 498 835 558 710 548" fill="none"/>

  <text x="880" y="594" text-anchor="middle">Callback(processSettlements payload)</text>
  <line class="msg" x1="710" y1="610" x2="1045" y2="610"/>

  <text x="720" y="658" text-anchor="middle">SettlementSucceeded / SettlementFailed / SettlementProcessed</text>
  <line class="msg" x1="1050" y1="674" x2="715" y2="674"/>

  <rect class="note" x="478" y="704" width="464" height="42"/>
  <text x="710" y="730" text-anchor="middle">If funding depletes, new intake/dispatch pauses; tracked outcomes still reconcile.</text>
</svg>
